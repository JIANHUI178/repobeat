name: RepoBeat 巡检

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "7 8 * * 1"  # 每周一早上 8 点

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以准确分析活跃度

      - name: RepoBeat 巡检
        uses: repobeat/action@v1
        with:
          fail-on-critical: "true"
          fail-on-score-below: "50"
          comment-on-pr: "true"
